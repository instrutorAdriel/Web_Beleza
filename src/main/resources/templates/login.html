<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPagina}">Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/javaScript/login.js}" defer></script>
</head>
<body class="ssp-page">

<div class="ssp-logo-fixed-container">
    <img th:src="@{/img/branca_senac.png}" alt="Logo Senac" class="ssp-logo-senac">
</div>

<div class="ssp-login-centered-container">
    <div class="ssp-form-card">

        <div class="ssp-header-page-login">
            <a class="ssp-login-button-back" th:href="@{/}">&larr; Voltar para o Portal</a>
            <h1 th:text="${tituloPagina}">Entrar</h1>
        </div>

        <div th:if="${erro}" class="ssp-form-control input-error" style="display: block; margin-bottom: 1rem; background-color: rgba(220, 38, 38, 0.1); padding: 0.8rem; border-radius: 6px;">
            <span class="ssp-error-message" style="display: block; color: #dc2626;" th:text="${erro}">E-mail ou senha incorretos.</span>
        </div>

        <form th:action="@{/login}" th:object="${usuarioDTO}" method="POST">
            <div class="ssp-form-group">
                <label for="email">E-mail</label>
                <input type="email" th:field="*{email}" id="email" class="ssp-form-control" placeholder="seuemail@gmail.com" required>
            </div>

            <div class="ssp-form-group">
                <label for="password">Senha</label>
                <div class="ssp-password-wrapper">
                    <input type="password" th:field="*{senha}" id="password" class="ssp-form-control" placeholder="Digite sua senha" required>
                    <button type="button" class="ssp-toggle-password" id="btnToggleLogin" aria-label="Mostrar ou ocultar senha">
                        <i class="fa-solid fa-eye-slash" id="eyeIcon1"></i>
                    </button>
                </div>
            </div>

            <div class="ssp-form-options text-right">
                <a th:href="@{/recuperar-senha}" class="ssp-forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="ssp-btn-submit">Entrar</button>
        </form>

        <div class="ssp-register-footer" style="margin-top: 1.5rem;">
            Não possui conta? <a th:href="@{/cadastro}">Cadastre-se</a>
        </div>
    </div>
</div>

</body>
</html>
