<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPagina}">Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/javaScript/login.js}"></script>
</head>
<body class="ssp-login-page">



<div class="ssp-login-centered-container">
    <div class="ssp-form-card">

        <div class="ssp-header-page-login">
            <h1 th:text="${tituloPagina}">Entrar</h1>
        </div>

        <div th:if="${erro}" class="ssp-alert-error">
            <span class="ssp-error-message-box" th:text="${erro}">E-mail ou senha incorretos.</span>
        </div>

        <form th:action="@{/usuario/login}" th:object="${usuarioDTO}" method="POST">
            <div class="ssp-form-group">
                <label th:for="email">E-mail</label>
                <input type="email" th:field="*{email}" id="email" class="ssp-form-control" placeholder="seuemail@gmail.com" required>
            </div>

            <div class="ssp-form-group">
                <label th:for="senha">Senha</label>
                <div class="ssp-password-wrapper">
                    <input type="password" th:field="*{senha}" id="password" class="ssp-form-control" placeholder="Digite sua senha" required>
                    <button type="button" class="ssp-toggle-password" id="btnToggleLogin">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <div class="ssp-form-options text-right">
                <a th:href="@{/usuario/recuperar-senha}" class="ssp-forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="ssp-btn-submit">Entrar</button>
        </form>

        <div class="ssp-divider"><span>ou</span></div>

        <div class="ssp-social-login">
            <a href="https://accounts.google.com/v3/signin/identifier?continue=https%3A%2F%2Fmail.google.com%2Fmail%2Fu%2F0%2F..." class="ssp-btn-social ssp-btn-google">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                Google
            </a>

            <a href="https://login.microsoftonline.com/common/oauth2/v2.0/authorize?..." class="ssp-btn-social ssp-btn-microsoft">
                <svg width="18" height="18" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#f35325" d="M0 0h11v11H0z"/>
                    <path fill="#81bc06" d="M12 0h11v11H12z"/>
                    <path fill="#05a6f0" d="M0 12h11v11H0z"/>
                    <path fill="#ffba08" d="M12 12h11v11H12z"/>
                </svg>
                Microsoft
            </a>
        </div>

        <div class="ssp-register-footer">
            Não possui conta? <a th:href="@{/usuario/cadastro}">Cadastre-se</a>
        </div>
    </div>
</div>
</body>
</html>
