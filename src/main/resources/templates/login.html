            <h1 th:text="${tituloPagina}">Entrar</h1>
        </div>

        <!-- Alerta de Erro: Aparece se as credenciais não forem encontradas no banco -->
        <div th:if="${erro}" class="ssp-form-control input-error" style="display: block; margin-bottom: 1rem; background-color: rgba(220, 38, 38, 0.1); padding: 0.8rem; border-radius: 6px;">
            <span class="ssp-error-message" style="display: block;" th:text="${erro}">E-mail ou senha incorretos.</span>
        </div>

        <!-- Formulário: Envia os dados para a Controller validar no banco de dados -->
        <form th:action="@{/login}" th:object="${usuarioDTO}" method="POST">
            <div class="ssp-form-group">
                <label th:for="email">E-mail</label>
                <input type="email" th:field="*{email}" id="email" class="ssp-form-control" placeholder="seuemail@gmail.com" required>
            </div>

            <div class="ssp-form-group">
                <label th:for="senha">Senha</label>
                <div class="ssp-password-wrapper">
                    <input type="password" th:field="*{senha}" id="password" class="ssp-form-control" placeholder="Digite sua senha" required>
                    <button type="button" class="ssp-toggle-password" id="btnToggleLogin">
                        <i class="fa-solid fa-eye-slash" id="eyeIcon1"></i>
                    </button>
                </div>
            </div>

            <div class="ssp-form-options text-right">
                <a th:href="@{/recuperar-senha}" class="ssp-forgot-password">Esqueceu a senha?</a>
            </div>

            <!-- Botão de Envio: Dispara a verificação no Java -->
            <button type="submit" class="ssp-btn-submit">Entrar</button>
        </form>
