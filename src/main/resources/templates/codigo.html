  <!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${tituloPagina}">Verificar Código</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <script th:src="@{/javaScript/codigo.js}"></script>
</head>
<body class="ssp-page">

<div class="ssp-logo-fixed-container">
  <img src="/img/branca_senac.png" alt="Logo SENAC" class="ssp-logo-senac">
</div>

<main class="ssp-login-centered-container">
  <div class="ssp-form-card">
    <header class="ssp-header-page-login">
      <a class="ssp-login-button-back" th:href="@{/recuperar-senha}">&larr; Voltar</a>
      <h1 style="color: #F29301;" th:text="${tituloPagina}">Verificar Código</h1>
      <p class="ssp-register-footer" style="text-align: left; margin-top: 0.5rem;">
        Digite o código de segurança enviado para o seu e-mail.
      </p>
    </header>

    <div th:if="${erro}" class="ssp-form-control input-error" style="display: block; margin-bottom: 1rem; background-color: rgba(220, 38, 38, 0.1); padding: 0.8rem; border-radius: 6px;">
      <span class="ssp-error-message" style="display: block;" th:text="${erro}">Código incorreto.</span>
    </div>

    <form id="kc-form-code" th:action="@{/verificar-codigo}" th:object="${usuarioDTO}" method="POST">
      <div class="ssp-form-group">
        <label th:for="codigoVerificacao">Código de Verificação</label>
        <input type="text" th:field="*{codigoVerificacao}" id="codigoVerificacao" class="ssp-form-control" placeholder="Ex: 123456" required style="text-align: center; font-size: 1.3rem; letter-spacing: 4px; font-weight: 600;">
      </div>

      <button type="submit" class="ssp-btn-submit" style="margin-top: 1rem;">Verificar Código</button>

    </form>
  </div>
</main>
</body>
</html>
