<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title th:text="${tituloPagina}">Perfil</title>
</head>
<body class="body-perfil">
<div class="painel-controle">
    <div class="container-painel">
        <div class="sidebar">
            <h3 class="bar-item">Painel</h3>
            <a th:href="@{/perfil}" data-target="perfil-informacao" class="bar-item button" th:classappend="${abaAtiva == 'informacao'} ? 'active'">Informação do Perfil</a>
            <a th:href="@{/perfil(aba='configuracao')}" data-target="perfil-configuracao" class="bar-item button" th:classappend="${abaAtiva == 'configuracao'} ? 'active'">Configuração do Perfil</a>
            <a th:href="@{/perfil(aba='agendamento')}" data-target="perfil-agendamento" class="bar-item button" th:classappend="${abaAtiva == 'agendamento'} ? 'active'">Agendamentos</a>
            <a th:href="@{/perfil(aba='avaliacao')}" class="bar-item button" th:classappend="${abaAtiva == 'avaliacao'} ? 'active'">Avaliações</a>
            <a th:href="@{/}" class="bar-item button">Voltar</a>
        </div>
    </div>
    <div class="conteudo-principal">
        <section id="perfil-informacao" class="secao-painel" th:if="${abaAtiva == 'informacao'}">
            <div class="secao-header">
                <h2>Informação do Perfil</h2>
            </div>

            <form class="form-perfil" th:action="@{/perfil/atualizar-perfil}" th:object="${usuarioDTO}" method="POST">
                <div class="group-info success" th:if="${mensagemSucesso}">
                    <span th:text="${mensagemSucesso}"></span>
                </div>
                <div class="group-info error" th:if="${mensagemError}">
                    <span th:text="${mensagemError}"></span>
                </div>
                <div class="form-grid">
                    <div class="group-input">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" th:field="*{nomeCompleto}" readonly>
                    </div>
                    <div class="group-input">
                        <label for="data_nascimento">Data de Nascimento</label>
                        <input type="text" id="data_nascimento" name="data_nascimento" th:field="*{dataNascimento}" maxlength="10" min="1900-01-01">
                    </div>
                    <div class="group-input">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" name="telefone" th:field="*{telefone}" maxlength="15">
                    </div>
                    <div class="group-input">
                        <label for="email">E-mail</label>
                        <input type="text" id="email" name="email" th:field="*{email}" readonly>
                    </div>
                    <div class="group-input">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" name="endereco" th:field="*{endereco}">
                    </div>
                    <div class="group-input"></div>
                    <div class="group-button">
                        <button type="submit" class="btn">Salvar</button>
                    </div>
                </div>
            </form>
        </section>
        <section id="perfil-configuracao" class="secao-painel" th:if="${abaAtiva == 'configuracao'}">
            <div class="secao-header">
                <h2>Configuração do Perfil</h2>
            </div>

            <form class="form-perfil" th:action="@{/perfil/atualizar-senha}" th:object="${usuarioDTO}" method="POST">
                <h3>Atualizar Senha</h3>
                <div class="group-info success" th:if="${mensagemSucesso}">
                    <span th:text="${mensagemSucesso}"></span>
                </div>
                <div class="group-info error" th:if="${mensagemError}">
                    <span th:text="${mensagemError}"></span>
                </div>

                <div class="group-input">
                    <label for="senha-atual">Senha Atual</label>
                    <input th:field="*{senha}" type="password" id="senha-atual" name="senha-atual">
                </div>
                <div class="group-input">
                    <label for="senha-nova">Nova Senha</label>
                    <input th:field="*{novaSenha}" type="password" id="senha-nova" name="senha-nova">
                </div>
                <div class="group-input">
                    <label for="senha-confirmar">Confirmar Nova Senha</label>
                    <input th:field="*{confirmacaoSenha}" type="password" id="senha-confirmar" name="senha-confirmar">
                </div>
                <div class="group-button">
                    <button type="submit" class="btn">Atualizar Senha</button>
                </div>
            </form>
        </section>
        <section id="perfil-agendamento" class="secao-painel" th:if="${abaAtiva == 'agendamento'}">
            <div class="secao-header">
                <h2>Agendamentos</h2>
            </div>
        </section>
        <section id="perfil-avaliacao" class="secao-painel" th:if="${abaAtiva == 'avaliacao'}">
            <div class="secao-header">
                <h2>Avaliações</h2>
            </div>

            <form class="form-perfil" id="depoimento-form" enctype="multipart/form-data">
                <div class="form-grid">
                    <div class="depoimento-erro" id="depoimento-erro" style="display:none;"></div>

                    <div class="group-input">
                        <label for="dep-nome">Seu nome</label>
                        <input type="text" id="dep-nome" name="nome" placeholder="Como podemos te chamar" required>
                    </div>

                    <div class="group-input">
                        <label for="dep-servico">Serviço avaliado</label>
                        <select id="dep-servico" name="servico" required>
                            <option value="" selected disabled>Selecione o serviço</option>
                            <option th:each="serv : ${nomesServicos}"
                                    th:value="${serv}"
                                    th:text="${serv}">
                            </option>
                        </select>
                    </div>

                    <div class="group-input">
                        <label for="dep-unidade">Unidade</label>
                        <select id="dep-unidade" name="unidade" required>
                            <option value="" selected disabled>Selecione a unidade</option>
                            <option th:each="uni : ${unidades}"
                                    th:value="${uni}"
                                    th:text="${uni}">
                            </option>
                        </select>
                    </div>

                    <div class="group-input">
                        <label for="dep-texto">Seu depoimento</label>
                        <textarea id="dep-texto" name="texto" placeholder="Escreva aqui o que achou..." required></textarea>
                    </div>

                    <div class="group-input">
                        <label for="dep-foto1">Foto 1 (opcional)</label>
                        <input type="file" id="dep-foto1" name="foto1" accept="image/*">
                        <img id="dep-foto1-preview" class="depoimento-foto-preview" alt="Prévia da foto 1">
                    </div>

                    <div class="group-input">
                        <label for="dep-foto2">Foto 2 (opcional)</label>
                        <input type="file" id="dep-foto2" name="foto2" accept="image/*">
                        <img id="dep-foto2-preview" class="depoimento-foto-preview" alt="Prévia da foto 2">
                    </div>

                    <div class="depoimento-checkbox-linha">
                        <input type="checkbox" id="dep-mostrar-nome" name="mostrarNome" checked>
                        <label for="dep-mostrar-nome">Pode mostrar meu nome junto com o depoimento no site. Se desmarcar, publicamos como anônimo.</label>
                    </div>

                    <div class="group-button">
                        <button type="submit" class="btn" id="depoimento-btn-enviar">Enviar depoimento</button>
                    </div>
                </div>
            </form>

            <div class="depoimento-sucesso" id="depoimento-sucesso" style="display:none;">
                <h3>Obrigado!</h3>
                <p>Seu depoimento foi recebido com sucesso.</p>
            </div>
        </section>
    </div>
    <div class="modal" hidden>
    </div>
</div>
<script th:src="@{/javaScript/perfil.js}"></script>
</body>
</html>
