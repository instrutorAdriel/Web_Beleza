<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/perfil.css}">
    <title th:text="${tituloPagina}">Perfil</title>
</head>
<body>
<div class="painel-controle">
    <div class="container-painel">
        <div class="sidebar">
            <h3 class="bar-item">Painel</h3>
            <a href="#" data-target="perfil-informacao" class="bar-item button active">Informação do Perfil</a>
            <a href="#" data-target="perfil-configuracao" class="bar-item button">Configuração do Perfil</a>
            <a href="#" data-target="perfil-agendamento" class="bar-item button">Agendamentos</a>
            <a href="#" data-target="perfil-avaliacao" class="bar-item button">Avaliações</a>
            <a th:href="@{/}" class="bar-item button">Voltar</a>
        </div>

        <div class="conteudo-principal">
            <section id="perfil-informacao" class="secao-painel">
                <div class="secao-header">
                    <h2>Informação do Perfil</h2>
                </div>

                <div class="group-info" th:if="${mensagem}">
                    <span th:text="${mensagem}"></span>
                </div>

                <form class="form-perfil" th:action="@{/perfil/atualizar-perfil}" th:object="${usuarioDTO}" method="post">
                    <div class="form-grid">
                        <div class="group-input">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" th:field="*{nomeCompleto}" readonly>
                        </div>

                        <div class="group-input">
                            <label for="data_nascimento">Data de Nascimento</label>
                            <input type="text" id="data_nascimento" th:field="*{dataNascimento}" maxlength="10">
                        </div>

                        <div class="group-input">
                            <label for="telefone">Telefone</label>
                            <input type="text" id="telefone" th:field="*{telefone}" maxlength="15">
                        </div>

                        <div class="group-input">
                            <label for="email">E-mail</label>
                            <input type="text" id="email" th:field="*{email}" readonly>
                        </div>

                        <div class="group-input">
                            <label for="endereco">Endereço</label>
                            <input type="text" id="endereco" th:field="*{endereco}">
                        </div>

                        <div class="group-button">
                            <button type="submit" class="btn">Salvar</button>
                        </div>
                    </div>
                </form>
            </section>

            <section id="perfil-configuracao" class="secao-painel hidden">
                <div class="secao-header">
                    <h2>Configuração do Perfil</h2>
                </div>

                <div class="group-info" th:if="${mensagem}">
                    <span th:text="${mensagem}"></span>
                </div>

                <form class="form-perfil" th:action="@{/perfil/atualizar-senha}" method="post">
                    <h3>Atualizar Senha</h3>

                    <div class="group-input">
                        <label for="senha-atual">Senha Atual</label>
                        <input type="password" id="senha-atual" name="senhaAtual">
                    </div>

                    <div class="group-input">
                        <label for="senha-nova">Nova Senha</label>
                        <input type="password" id="senha-nova" name="senhaNova">
                    </div>

                    <div class="group-input">
                        <label for="senha-confirmar">Confirmar Nova Senha</label>
                        <input type="password" id="senha-confirmar" name="senhaConfirmar">
                    </div>

                    <div class="group-button">
                        <button type="submit" class="btn">Atualizar Senha</button>
                    </div>
                </form>
            </section>

            <section id="perfil-agendamento" class="secao-painel hidden">
                <div class="secao-header">
                    <h2>Agendamentos</h2>
                </div>
            </section>

            <section id="perfil-avaliacao" class="secao-painel hidden">
                <div class="secao-header">
                    <h2>Avaliações</h2>
                </div>

                <form class="form-perfil" id="depoimento-form" enctype="multipart/form-data">
                    <div class="form-grid">
                        <div class="depoimento-erro" id="depoimento-erro" style="display:none;"></div>

                        <div class="group-input">
                            <label for="dep-nome">Seu nome</label>
                            <input type="text" id="dep-nome" name="nome" placeholder="Como podemos te chamar" required>
                        </div>

                        <div class="group-input">
                            <label for="dep-procedimento">Procedimento avaliado</label>
                            <select id="dep-procedimento" name="procedimento" required>
                                <option value="" selected disabled>Selecione o procedimento</option>
                            </select>
                        </div>

                        <div class="group-input">
                            <label for="dep-texto">Seu depoimento</label>
                            <textarea id="dep-texto" name="texto" placeholder="Escreva aqui o que achou..." required></textarea>
                        </div>

                        <div class="group-input">
                            <label for="dep-foto">Foto (opcional)</label>
                            <input type="file" id="dep-foto" name="foto" accept="image/*" onchange="mostrarPreviewFoto(event)">
                            <img id="dep-foto-preview" class="depoimento-foto-preview" alt="Prévia da foto">
                        </div>

                        <div class="depoimento-checkbox-linha">
                            <input type="checkbox" id="dep-mostrar-nome" name="mostrarNome" checked>
                            <label for="dep-mostrar-nome">Pode mostrar meu nome junto com o depoimento no site. Se desmarcar, publicamos como anônimo.</label>
                        </div>

                        <div class="group-button">
                            <button type="submit" class="btn" id="depoimento-btn-enviar">Enviar depoimento</button>
                        </div>
                    </div>
                </form>

                <div class="depoimento-sucesso" id="depoimento-sucesso" style="display:none;">
                    <h3>Obrigado! 🎉</h3>
                    <p>Seu depoimento foi recebido com sucesso.</p>
                </div>
            </section>
        </div>
    </div>
</div>

<script th:src="@{/javaScript/perfil.js}"></script>
<script>
    const DEPOIMENTO_API_URL = 'http://localhost:8080/api/depoimentos';

    function mostrarPreviewFoto(event) {
        const arquivo = event.target.files[0];
        const preview = document.getElementById('dep-foto-preview');

        if (arquivo) {
            const leitor = new FileReader();
            leitor.onload = function (e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            leitor.readAsDataURL(arquivo);
        } else {
            preview.style.display = 'none';
        }
    }

    document.getElementById('depoimento-form').addEventListener('submit', function (e) {
        e.preventDefault();

        const form = this;
        const btnEnviar = document.getElementById('depoimento-btn-enviar');
        const caixaErro = document.getElementById('depoimento-erro');

        caixaErro.style.display = 'none';
        caixaErro.textContent = '';
        btnEnviar.disabled = true;
        btnEnviar.textContent = 'Enviando...';

        const dados = new FormData();
        dados.append('nome', form.nome.value);
        dados.append('texto', form.texto.value);
        dados.append('procedimento', document.getElementById('dep-procedimento').value);
        dados.append('mostrarNome', document.getElementById('dep-mostrar-nome').checked);

        if (form.foto.files[0]) {
            dados.append('foto', form.foto.files[0]);
        }

        fetch(DEPOIMENTO_API_URL, { method: 'POST', body: dados })
            .then(async (resposta) => {
                if (!resposta.ok) {
                    const texto = await resposta.text();
                    throw new Error(texto || 'Não foi possível enviar o depoimento.');
                }
                form.style.display = 'none';
                document.getElementById('depoimento-sucesso').style.display = 'block';
            })
            .catch((erro) => {
                caixaErro.textContent = erro.message || 'Erro ao enviar. Tente novamente.';
                caixaErro.style.display = 'block';
            })
            .finally(() => {
                btnEnviar.disabled = false;
                btnEnviar.textContent = 'Enviar depoimento';
            });
    });
</script>
</body>
</html>
