<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPagina}">Alterar Senha</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script th:src="@{/javaScript/alterar-senha.js}" defer></script>
</head>
<body>

<div class="ssp-logo-fixed-container">
    <img src="/img/branca_senac.png" alt="Logo SENAC" class="ssp-logo-senac">
</div>

<main class="ssp-login-centered-container">
    <div class="ssp-form-card">

        <header class="ssp-header-page-login">
            <a class="ssp-login-button-back" th:href="@{/login}">&larr; Voltar para o Login</a>
            <h1 th:text="${tituloPagina}">Alterar Senha</h1>
            <p class="ssp-register-footer">
                Digite e confirme sua nova senha de acesso abaixo.
            </p>
        </header>

        <div th:if="${erro}" class="ssp-form-control input-error" style="display: block; margin-bottom: 1rem; background-color: rgba(220, 38, 38, 0.1); padding: 0.8rem; border-radius: 6px;">
            <span class="ssp-error-message" style="display: block;" th:text="${erro}"></span>
        </div>

        <div th:if="${succ}" class="ssp-form-control" style="display: block; margin-bottom: 1rem; background-color: rgba(0, 213, 111, 0.1); padding: 0.8rem; border-radius: 6px;">
            <span class="ssp-success-message" style="display: block;" th:text="${succ}"></span>
        </div>

        <form id="form-alterar-senha" th:action="@{/alterar-senha/{token}(token=${token})}" th:object="${usuarioDTO}" method="POST">
            <div class="ssp-form-group">
                <label th:for="senha">Nova Senha</label>
                <div class="ssp-password-wrapper">
                    <input type="password" th:field="*{senha}" id="senha" class="ssp-form-control" placeholder="Digite a nova senha" required>
                    <button type="button" class="ssp-toggle-password" id="btnToggle1" aria-label="Mostrar senha">
                        <i class="fa-solid fa-eye-slash" id="eyeIcon1"></i>
                    </button>
                </div>
            </div>

            <div class="ssp-form-group">
                <label th:for="confirmacaoSenha">Confirmar Nova Senha</label>
                <div class="ssp-password-wrapper">
                    <input type="password" th:field="*{confirmacaoSenha}" id="confirmacaoSenha" class="ssp-form-control" placeholder="Repita a nova senha" required>
                    <button type="button" class="ssp-toggle-password" id="btnToggle2" aria-label="Mostrar senha">
                        <i class="fa-solid fa-eye-slash" id="eyeIcon2"></i>
                    </button>
                </div>
                <div id="password-error" class="ssp-error-message">As senhas não coincidem.</div>
            </div>

            <button type="submit" class="ssp-btn-submit">Atualizar Senha</button>
        </form>

    </div>
</main>

</body>
</html>
