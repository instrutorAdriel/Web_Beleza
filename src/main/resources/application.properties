spring.application.name=demo

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3307/agendamentos_db?createDatabaseIfNotExist=true
?createDatabeseIfNotExist=true
&useSSL=false
&allowPublicKeyRetrieval=true
&serverTimezone=America/Sao_Paulo

spring.datasource.username=root

spring.datasource.password=senac

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# Configuração do Mail Sender

spring.mail.default-encoding=UTF-8
# Porta de criptografia SSL/TLS
spring.mail.port=587
spring.mail.host=smtp-mail.outlook.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# É necessário colocar um email responsável para enviar o link/código para alterar senha
# no momento foi utilizando e-mail pessoal para esse teste
spring.mail.username=...
spring.mail.password=...
